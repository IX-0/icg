<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoleon's Fate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
        }

        /* Crosshair */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 50;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.75);
        }

        #crosshair::before {
            width: 16px;
            height: 1.5px;
            top: 0;
            left: -8px;
        }

        #crosshair::after {
            width: 1.5px;
            height: 16px;
            top: -8px;
            left: 0;
        }

        /* HUD */
        #hud-stats {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #e8f4ff;
            font-size: 12px;
            line-height: 1.8;
            z-index: 100;
            pointer-events: none;
            background: rgba(5, 10, 20, 0.55);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* --- HUD Glassmorphism --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
            font-family: 'Inter', sans-serif;
            pointer-events: auto;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
        }


        /* Interact prompt */
        #interact-prompt {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(6px);
            color: #fff;
            padding: 8px 20px;
            border-radius: 6px;
            z-index: 50;
            display: none;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* ── Start overlay ── */
        #instructions {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            background: linear-gradient(160deg, rgba(0, 8, 20, 0.92) 0%, rgba(10, 20, 40, 0.85) 100%);
            backdrop-filter: blur(2px);
        }

        .overlay-card {
            width: min(480px, 90vw);
            background: rgba(8, 14, 28, 0.82);
            border: 1px solid rgba(80, 140, 220, 0.25);
            border-radius: 16px;
            padding: 44px 40px 36px;
            text-align: center;
            box-shadow: 0 0 80px rgba(30, 80, 180, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .overlay-title {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #c8deff;
            margin-bottom: 6px;
            text-shadow: 0 0 40px rgba(100, 160, 255, 0.6);
        }

        .overlay-subtitle {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(140, 180, 255, 0.5);
            margin-bottom: 32px;
        }

        .overlay-divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(80, 140, 220, 0.35), transparent);
            margin: 0 0 28px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(200, 220, 255, 0.75);
            font-size: 13px;
        }

        .control-row .keys {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .kbd {
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            padding: 2px 7px;
            font-family: monospace;
            font-size: 11px;
            color: rgba(190, 220, 255, 0.9);
            min-width: 26px;
            text-align: center;
        }

        .start-btn {
            display: inline-block;
            padding: 13px 42px;
            background: linear-gradient(135deg, #1a4a9e 0%, #0d2b6e 100%);
            color: #c8deff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
            border: 1px solid rgba(80, 140, 220, 0.4);
            box-shadow: 0 4px 24px rgba(20, 60, 180, 0.35);
            transition: all 0.2s ease;
            user-select: none;
        }

        .start-btn:hover {
            background: linear-gradient(135deg, #2562c8 0%, #1a3d9e 100%);
            box-shadow: 0 6px 32px rgba(40, 100, 220, 0.5);
            transform: translateY(-1px);
        }

        .start-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div id="instructions">
        <div class="overlay-card">
            <div class="overlay-title">NAPOLEON'S FATE</div>
            <div class="overlay-subtitle">A Mind-Breaking Sea Experience</div>
            <hr class="overlay-divider">
            <div class="controls-grid">
                <div class="control-row">
                    <div class="keys">
                        <span class="kbd">W</span><span class="kbd">A</span>
                        <span class="kbd">S</span><span class="kbd">D</span>
                    </div>
                    <span>Move</span>
                </div>
                <div class="control-row">
                    <div class="keys"><span class="kbd">Mouse</span></div>
                    <span>Look</span>
                </div>
                <div class="control-row">
                    <div class="keys"><span class="kbd">L-Click</span></div>
                    <span>Grab / Drop</span>
                </div>
                <div class="control-row">
                    <div class="keys"><span class="kbd">R-Click</span></div>
                    <span>Use Item</span>
                </div>
                <div class="control-row">
                    <div class="keys"><span class="kbd">C</span></div>
                    <span>Crouch</span>
                </div>
                <div class="control-row">
                    <div class="keys"><span class="kbd">Space</span></div>
                    <span>Jump</span>
                </div>
            </div>
            <div class="start-btn" id="start-btn">Enter the Loop</div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="hud" style="display:none;"></div>
    <div id="interact-prompt">Press <strong>E</strong> to interact</div>

    <script type="module" src="./src/main.ts"></script>
</body>

</html>
